<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Friggin tuff particle simulation</title>

  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; }

    body { width: 100vw; height: 100vh; background-color: dimgray; overflow: hidden; }

    .canvas-container {
        position: absolute;
        width: 100%;
        height: 80%;

        top: 0;
        left: 0;
    }

    canvas {
        width: 450px;
        height: 900px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
        overflow: hidden;

        outline: 32px ridge gold;
    }

    @media (orientation: landscape) {
        .canvas-container {
            width: 80%;
            height: 100%;

            top: 0;
            left: 20%;
        }
    }
  </style>

</head>

<body>

  <div class="canvas-container" id="canvas-container">
    <canvas id="canvas" width="150" height="300"></canvas>
  </div>


  <script type="module" src="/src/main.ts"></script>
  <script type="module" src="/src/canvas-controls.ts"></script>
</body>

</html>
